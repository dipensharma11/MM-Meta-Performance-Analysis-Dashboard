name: Daily dashboard refresh

on:
  schedule:
    # ~11 AM IST after GitHub's queue delay; 1:30 PM sweep catches late sheet updates
    - cron: '0 5 * * *'
    - cron: '0 8 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run daily refresh
        env:
          SHEETS_API_KEY: ${{ secrets.SHEETS_API_KEY }}
        run: python3 scripts/daily_refresh.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet index.html; then
            echo "No changes to publish."
          else
            git add index.html
            git commit -m "Automated daily refresh: $(date -u +%Y-%m-%d)"
            git push
          fi
